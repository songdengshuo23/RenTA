# E2E 测试专用配置
# 需要 ca-server 以 Mock 模式运行：
#   AGENT_REGISTRY_MOCK=true HTTP01_VALIDATION_MOCK=true python main.py

CA_SERVER_BASE_URL = http://localhost:8003/acps-atr-v2
CHALLENGE_SERVER_BASE_URL = http://localhost:8004/acps-atr-v2

# 跳过向 Challenge Server 部署 token
CHALLENGE_DEPLOY_MOCK = true

ACCOUNT_KEY_PATH = {workspace}/private/account.key
CERTS_DIR = {workspace}/certs
PRIVATE_KEYS_DIR = {workspace}/private
CSR_DIR = {workspace}/csr
TRUST_BUNDLE_PATH = {workspace}/certs/trust-bundle.pem
